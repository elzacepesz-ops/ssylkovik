<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>Ссылковик</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #ffffff;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: max(16px, calc(var(--tg-safe-area-inset-top, 0px) + var(--tg-content-safe-area-inset-top, 0px) + 16px)) 16px 60px;
    }

    .card {
      background: white;
      padding: 16px;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    input[type="url"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Montserrat', sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #7F42E1;
      background: white;
    }

    .field {
      margin-bottom: 20px;
    }

    /* Дата-строка */
    .date-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .date-row input[type="text"] {
      flex: 1;
    }

    /* Скрытый нативный date-picker */
    .calendar-wrap {
      position: relative;
    }

    .calendar-wrap input[type="date"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      cursor: pointer;
    }

    .date-quick-btn {
      padding: 11px 14px;
      background: #f5f5f7;
      color: #444;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .date-quick-btn:hover { background: #ede8fc; border-color: #7F42E1; color: #7F42E1; }
    .date-quick-btn.active { background: #7F42E1; border-color: #7F42E1; color: white; }
    .date-quick-btn.active-light { background: #ede8fc; border-color: #7F42E1; color: #7F42E1; }

    .cal-btn {
      padding: 11px 14px;
      background: #ede8fc;
      color: #7F42E1;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }

    .cal-btn:hover { background: #ddd3f7; }

    .medium-field {
      padding: 12px 16px;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Montserrat', sans-serif;
      color: #999;
      background: #fafafa;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }

    button.generate {
      width: 100%;
      padding: 14px;
      background: #7F42E1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    button.generate:hover { background: #6b32c5; }

    .preset-btn {
      padding: 7px 18px;
      background: #f5f5f7;
      color: #444;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover { background: #ede8fc; border-color: #7F42E1; color: #7F42E1; }
    .preset-btn.active { background: #7F42E1; border-color: #7F42E1; color: white; }

    .results {
      margin-top: 28px;
      display: none;
    }

    .result-item {
      background: #faf8ff;
      border: 1.5px solid #e8e0fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .source-tag {
      font-size: 12px;
      font-weight: 700;
      color: #7F42E1;
      background: #ede8fc;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .copy-btn {
      font-size: 13px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      color: #7F42E1;
      background: none;
      border: 1.5px solid #7F42E1;
      border-radius: 8px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover { background: #7F42E1; color: white; }
    .copy-btn.copied { background: #7F42E1; border-color: #7F42E1; color: white; }

    .url-text {
      font-size: 12px;
      color: #444;
      word-break: break-all;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 24px 0;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🔗 Ссылковик</h1>

  <div class="field">
    <label>Ссылка</label>
    <input type="url" id="url" placeholder="Вставь ссылку">
  </div>

  <div class="field">
    <label>Кампания (utm_campaign)</label>
    <div style="display:flex; gap:8px; margin-bottom:8px;">
      <button class="preset-btn" onclick="setPreset('post')">post</button>
      <button class="preset-btn" onclick="setPreset('webinar')">webinar</button>
      <button class="preset-btn" onclick="setPreset('news')">news</button>
    </div>
    <input type="text" id="campaign" placeholder="Выбери нужное">
  </div>

  <div class="row">
    <div class="field" style="margin-bottom:0">
      <label>Дата (utm_content)</label>
      <div class="date-row">
        <button class="date-quick-btn" id="btn-today" onclick="setToday(this)">Сегодня</button>
        <button class="date-quick-btn" id="btn-tomorrow" onclick="setTomorrow(this)">Завтра</button>
        <div style="position:relative; display:inline-block;">
          <button class="date-quick-btn" id="btn-cal" style="pointer-events:none;">📅</button>
          <input type="date" id="cal-input" onchange="setFromCalendar(this.value)"
            style="position:absolute; inset:0; opacity:0; cursor:pointer; z-index:2;">
        </div>
      </div>
      <input type="text" id="date-picker" style="display:none;">
    </div>
    <div class="field" style="margin-bottom:0">
      <label>Канал (utm_medium)</label>
      <div class="medium-field">smm</div>
    </div>
  </div>

  <button class="generate" onclick="generate()" style="margin-top: 20px;">Сгенерировать ссылки</button>

  <div class="results" id="results">
    <div class="divider"></div>
    <div id="result-vk" class="result-item"></div>
    <div id="result-max" class="result-item"></div>
    <div id="result-tg" class="result-item"></div>
    <div id="result-ig" class="result-item"></div>
  </div>
</div>

<script>
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = Telegram.WebApp;
    document.body.style.opacity = '0';
    tg.expand();
    tg.ready();

    // Фиксируем высоту один раз — больше не меняем
    setTimeout(() => {
      const h = tg.viewportStableHeight || window.innerHeight;
      document.documentElement.style.height = h + 'px';
      document.body.style.height = h + 'px';
      document.body.style.transition = 'opacity 0.2s ease';
      document.body.style.opacity = '1';
    }, 250);
  }

  function formatDate(date) {
    const dd = String(date.getDate()).padStart(2, '0');
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const yyyy = date.getFullYear();
    return `${dd}_${mm}_${yyyy}`;
  }

  function setActiveDateBtn(btn, light = false) {
    document.querySelectorAll('.date-quick-btn').forEach(b => {
      b.classList.remove('active');
      b.classList.remove('active-light');
    });
    btn.classList.add(light ? 'active-light' : 'active');
  }

  function setDateValue(formatted) {
    document.getElementById('date-picker').value = formatted;
  }

  function setToday(btn) {
    setDateValue(formatDate(new Date()));
    setActiveDateBtn(btn);
  }

  function setTomorrow(btn) {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    setDateValue(formatDate(tomorrow));
    setActiveDateBtn(btn);
  }

  function setFromCalendar(val) {
    if (val) {
      const [yyyy, mm, dd] = val.split('-');
      setDateValue(`${dd}_${mm}_${yyyy}`);
      setActiveDateBtn(document.getElementById('btn-cal'), true);
    }
  }

  function formatDateInput(input) {
    let val = input.value.replace(/[^\d]/g, '');
    let result = '';
    if (val.length > 0) result += val.substring(0, 2);
    if (val.length >= 3) result += '_' + val.substring(2, 4);
    if (val.length >= 5) result += '_' + val.substring(4, 8);
    input.value = result;
  }

  function setPreset(value) {
    document.getElementById('campaign').value = value;
    document.getElementById('campaign').focus();
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  setToday(document.getElementById('btn-today'));

  function buildUrl(base, source, medium, campaign, content) {
    try {
      const url = new URL(base);
      url.searchParams.set('utm_source', source);
      url.searchParams.set('utm_medium', medium);
      url.searchParams.set('utm_campaign', campaign);
      url.searchParams.set('utm_content', content);
      return url.toString();
    } catch { return null; }
  }

  function renderResult(id, label, url) {
    document.getElementById(id).innerHTML = `
      <div class="result-header">
        <span class="source-tag">${label}</span>
        <button class="copy-btn" onclick="copyUrl('${id}-url', this)">Копировать</button>
      </div>
      <div class="url-text" id="${id}-url">${url}</div>
    `;
  }

  function generate() {
    const base = document.getElementById('url').value.trim();
    const campaign = document.getElementById('campaign').value.trim();
    const content = document.getElementById('date-picker').value || formatDate(new Date());
    const medium = 'smm';

    if (!base) { alert('Вставь ссылку'); return; }
    if (!campaign) { alert('Выбери кампанию'); return; }

    const sources = [
      { id: 'result-vk',  label: 'VK',        source: 'vk'        },
      { id: 'result-max', label: 'MAX',        source: 'max'       },
      { id: 'result-tg',  label: 'TG',         source: 'tg'        },
      { id: 'result-ig',  label: 'Instagram',  source: 'instagram' },
    ];

    document.getElementById('results').style.display = 'block';
    sources.forEach(({ id, label, source }) => {
      const url = buildUrl(base, source, medium, campaign, content);
      if (url) renderResult(id, label, url);
    });
  }

  function copyUrl(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
      btn.textContent = '✓ Скопировано';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
